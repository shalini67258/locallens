<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#030712" />
    <meta name="description" content="LocalLens - Hyperlocal AI Community Intelligence for India" />
    <title>LocalLens 🌍</title>

    <!-- Google Translate -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'hi,te,ta,kn,ml,mr,gu,pa,bn,or,as,ur,sa,ne,sd,kok,mai,mni,sat,ks',
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Google Translate hidden widget -->
    <div id="google_translate_element" style="display:none"></div>

    <div id="root"></div>

  </body>
</html>
